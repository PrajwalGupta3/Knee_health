<!DOCTYPE html>
<html>
<head>
  <title>Knee Health Predictor</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 2em; max-width: 700px; margin: auto; }
    input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 20px; background: #6a0dad; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #580e99; }
    h2, h3 { color: #444; }
    ul { background: #f9f9f9; padding: 15px; border-radius: 5px; }
    li { margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>Knee Health Predictor</h1>
  <form method="POST">
    <label>Age Group</label>
    <select name="ageGroup">
      <option>Young</option>
      <option>Young Adult</option>
      <option selected>Adult</option>
      <option>Older Adult</option>
      <option>Senior</option>
    </select>

    <label>Gender</label>
    <select name="gender">
      <option>Male</option>
      <option>Female</option>
      <option>Non-binary</option>
    </select>

    <label>Height (cm)</label><input type="number" name="height" step="0.1" required />
    <label>Weight (kg)</label><input type="number" name="weight" step="0.1" required />
    <label>Temperature (°C)</label><input type="number" name="temperature" step="0.1" required />
    <label>Pressure (N)</label><input type="number" name="pressure" step="0.1" required />
    <label>Gyro X (rad/s)</label><input type="number" name="gyroX" step="0.01" required />
    <label>Gyro Y (rad/s)</label><input type="number" name="gyroY" step="0.01" required />
    <label>Gyro Z (rad/s)</label><input type="number" name="gyroZ" step="0.01" required />
    <label>Accel X (m/s²)</label><input type="number" name="accelX" step="0.01" required />
    <label>Accel Y (m/s²)</label><input type="number" name="accelY" step="0.01" required />
    <label>Accel Z (m/s²)</label><input type="number" name="accelZ" step="0.01" required />

    <button type="submit">Predict</button>
  </form>

  {% if prediction %}
    <h2>Prediction: {{ prediction }}</h2>
    {% if diagnosis %}
      <h3>📋 Possible Diagnoses & Insights:</h3>
      <ul>
        {% for issue in diagnosis %}
          <li>{{ issue | safe }}</li>
        {% endfor %}
      </ul>
    {% endif %}
  {% endif %}
</body>
</html>
